<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отзыв о продукте</title>
</head>
<body>
    <h1>Отзыв о продукте</h1>
    <form action="submit_feedback.php" method="post">
        <label for="name">Имя:</label>
        <input type="text" id="name" name="name" required><br>
        <label for="email">Электронная почта:</label>
        <input type="email" id="email" name="email" required><br>
        <label for="product">Продукт:</label>
        <select id="product" name="product" required>
            <option value="product1">Продукт 1</option>
            <option value="product2">Продукт 2</option>
        </select><br>
        <label for="feedback">Отзыв:</label>
        <textarea id="feedback" name="feedback" required></textarea><br>
        <button type="submit">Отправить</button>
    </form>
</body>
</html>
